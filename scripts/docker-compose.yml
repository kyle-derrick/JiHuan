version: "3.9"

services:
  jihuan:
    image: jihuan-server:latest
    build:
      context: ..
      dockerfile_inline: |
        FROM rust:1.75-slim-bookworm AS builder
        RUN apt-get update && apt-get install -y protobuf-compiler pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
        WORKDIR /build
        COPY . .
        RUN cargo build --release -p jihuan-server -p jihuan-cli
        FROM debian:bookworm-slim
        RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
        COPY --from=builder /build/target/release/jihuan-server /usr/local/bin/
        COPY --from=builder /build/config/ /app/config/
        WORKDIR /app
        EXPOSE 8080 8081
        ENTRYPOINT ["jihuan-server"]
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"
    volumes:
      - jihuan-data:/data
    environment:
      JIHUAN_DATA_DIR: /data
      JIHUAN_HTTP_ADDR: "0.0.0.0:8080"
      JIHUAN_GRPC_ADDR: "0.0.0.0:8081"
      RUST_LOG: "info"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  jihuan-data:
