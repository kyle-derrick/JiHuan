# JiHuan - Default General-Purpose Configuration
# Balanced safety, speed, and space. Suitable for most workloads.

[storage]
data_dir = "./jihuan-data/data"
meta_dir = "./jihuan-data/meta"
wal_dir  = "./jihuan-data/wal"
block_file_size    = 1073741824  # 1 GB
chunk_size         = 4194304     # 4 MB
hash_algorithm     = "sha256"
compression_algorithm = "zstd"
compression_level  = 1
time_partition_hours = 24
gc_threshold       = 0.7
gc_interval_secs   = 300
max_open_block_files = 64
verify_on_read     = true
# Hard cap on total on-disk bytes. Uncomment to enable; omit for unlimited.
# Uploads that would exceed this are rejected with HTTP 507.
# max_storage_bytes  = 10737418240  # e.g. 10 GB

# v0.4.7 auto-compaction: two independent strategies share one scan →
# pack → commit pipeline.
#   Strategy A (low-utilisation): rewrite blocks whose live/size ratio
#     is below `auto_compact_threshold` to reclaim dead bytes.
#   Strategy B (undersized): merge sealed blocks whose absolute size
#     is below `block_file_size × auto_compact_undersize_ratio` to
#     converge the on-disk file count.
# Every knob below controls exactly one concern. See config/README.md
# § "Auto-compaction" for the full tuning guide.
auto_compact_enabled               = true     # master switch
auto_compact_threshold             = 0.5      # Strategy A candidate (live/size < 50%)
auto_compact_undersize_ratio       = 0.25     # Strategy B candidate (size < 25% of block_file_size)
auto_compact_min_file_saved        = 3        # Strategy B commit gate (file_count_saved ≥ 3)
auto_compact_min_block_age_secs    = 3600     # anti-thrash: skip blocks younger than 1 h
auto_compact_every_gc_ticks        = 12       # 12 × 300 s = once per hour
auto_compact_disk_headroom_bytes   = 536870912  # 512 MiB — require (live_sum + this)
                                                # free on the data filesystem before
                                                # writing a new block. 0 = skip check.
                                                # Never bypassed by `force=true`.

[server]
http_addr    = "0.0.0.0:8080"
grpc_addr    = "0.0.0.0:8081"
metrics_addr = "0.0.0.0:9090"
enable_access_log = true
# v0.4.5: wall-clock timeout (seconds) for control-plane routes
# (/api/status, /api/admin/*, /api/keys, etc). Upload and download are
# exempt so multi-GB streaming isn't cut off. 0 disables.
request_timeout_secs = 30

[auth]
# Set enabled = true to require API keys for all requests (except /api/status and /ui)
enabled = true
# Routes exempt from authentication (prefix match)
exempt_routes = ["/api/status", "/ui"]
# Retention window for audit-log rows. 0 = keep forever. The background GC
# loop purges events older than (now - audit_retention_days * 86400s).
audit_retention_days = 90
# Emit the `Secure` flag on session cookies. Keep `false` for plain-HTTP
# dev; flip to `true` once you terminate TLS (either via [tls] below or a
# reverse proxy), otherwise the browser silently drops the cookie.
cookie_secure = false

# Phase 3 — TLS/HTTPS. Default is off so v0.4.x configs keep working
# as plaintext. Two ways to turn it on:
#   1. Static PEM files (production): set cert_path + key_path.
#   2. Auto self-signed (dev only): set auto_selfsigned = true.
# See docs/operator-guide.md § 9b for full details + reverse-proxy examples.
[tls]
enabled         = false
cert_path       = ""
key_path        = ""
auto_selfsigned = false
