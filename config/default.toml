# JiHuan - Default General-Purpose Configuration
# Balanced safety, speed, and space. Suitable for most workloads.

[storage]
data_dir = "./jihuan-data/data"
meta_dir = "./jihuan-data/meta"
wal_dir  = "./jihuan-data/wal"
block_file_size    = 1073741824  # 1 GB
chunk_size         = 4194304     # 4 MB
hash_algorithm     = "sha256"
compression_algorithm = "zstd"
compression_level  = 1
time_partition_hours = 24
gc_threshold       = 0.7
gc_interval_secs   = 300
max_open_block_files = 64
verify_on_read     = true

[server]
http_addr    = "0.0.0.0:8080"
grpc_addr    = "0.0.0.0:8081"
metrics_addr = "0.0.0.0:9090"
enable_access_log = true

[auth]
# Set enabled = true to require API keys for all requests (except /api/status and /ui)
enabled = false
# Routes exempt from authentication (prefix match)
exempt_routes = ["/api/status", "/ui"]
