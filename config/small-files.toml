# JiHuan - Small Files Configuration
# 90%+ files under 10 KB (images, thumbnails, documents, icons).
# Smaller chunk & block sizes reduce waste from partially-filled blocks.

[storage]
data_dir = "./jihuan-data/data"
meta_dir = "./jihuan-data/meta"
wal_dir  = "./jihuan-data/wal"
block_file_size    = 536870912   # 512 MB
chunk_size         = 2097152     # 2 MB
hash_algorithm     = "sha256"
compression_algorithm = "zstd"
compression_level  = 3
time_partition_hours = 24
gc_threshold       = 0.7
gc_interval_secs   = 300
max_open_block_files = 64
verify_on_read     = true
# v0.4.7: small-file workloads fragment quickly under deletions and
# produce many small sealed blocks. Tune both strategies aggressive:
#   Strategy A threshold high (0.6) → reclaim as soon as a block is
#     40% dead.
#   Strategy B ratio high (0.5) + min_file_saved low (2) → aggressively
#     merge undersized blocks to keep file-handle-cache pressure down.
auto_compact_enabled               = true
auto_compact_threshold             = 0.6      # Strategy A — rewrite <60% utilised
auto_compact_undersize_ratio       = 0.5      # Strategy B — merge <50% of block_file_size
auto_compact_min_file_saved        = 2        # commit on 3→1 collapse
auto_compact_min_block_age_secs    = 3600     # anti-thrash
auto_compact_every_gc_ticks        = 12       # once per hour
auto_compact_disk_headroom_bytes   = 536870912  # 512 MiB

[server]
http_addr    = "0.0.0.0:8080"
grpc_addr    = "0.0.0.0:8081"
metrics_addr = "0.0.0.0:9090"
enable_access_log = true
