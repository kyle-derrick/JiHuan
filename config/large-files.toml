# JiHuan - Large Files Configuration
# 90%+ files over 100 MB (videos, backups, datasets, ISO images).
# Larger chunk & block sizes improve throughput and dedup granularity.

[storage]
data_dir = "./jihuan-data/data"
meta_dir = "./jihuan-data/meta"
wal_dir  = "./jihuan-data/wal"
block_file_size    = 2147483648  # 2 GB
chunk_size         = 8388608     # 8 MB
hash_algorithm     = "sha256"
compression_algorithm = "zstd"
compression_level  = 1
time_partition_hours = 72
gc_threshold       = 0.8
gc_interval_secs   = 600
max_open_block_files = 32
verify_on_read     = true
# v0.4.7: large-file workloads have big blocks; Strategy A conservative
# because every rewrite moves a lot of bytes. Strategy B ratio low (0.1)
# so only *very* undersized blocks merge, and min_file_saved high (5) so
# we only commit when the convergence is meaningful.
auto_compact_enabled               = true
auto_compact_threshold             = 0.4      # Strategy A — conservative (>60% dead)
auto_compact_undersize_ratio       = 0.1      # Strategy B — only <10% of block_file_size
auto_compact_min_file_saved        = 5        # commit on 6→1 collapse
auto_compact_min_block_age_secs    = 3600     # anti-thrash
auto_compact_every_gc_ticks        = 6        # 6 × 600 s = once per hour
auto_compact_disk_headroom_bytes   = 2147483648  # 2 GiB for 2 GB blocks

[server]
http_addr    = "0.0.0.0:8080"
grpc_addr    = "0.0.0.0:8081"
metrics_addr = "0.0.0.0:9090"
enable_access_log = true
