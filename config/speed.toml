# JiHuan - Extreme Speed Configuration
# Hot data, low-latency scenarios. Does not prioritise space savings.
# NOTE: MD5 is only appropriate for internal/private systems.

[storage]
data_dir = "./jihuan-data/data"
meta_dir = "./jihuan-data/meta"
wal_dir  = "./jihuan-data/wal"
block_file_size    = 536870912   # 512 MB
chunk_size         = 8388608     # 8 MB
hash_algorithm     = "md5"
compression_algorithm = "none"
compression_level  = 0
time_partition_hours = 12
gc_threshold       = 0.8
gc_interval_secs   = 120
max_open_block_files = 128
verify_on_read     = false
# v0.4.7: disabled for speed profile — compaction adds CPU / write amp
# and this profile prioritises latency. If you flip it on (say, after a
# purge of millions of files), the values below are the conservative
# starting point: only low-util work (Strategy B fully disabled) and
# generous headroom so background work never contends with foreground.
auto_compact_enabled               = false
auto_compact_threshold             = 0.3         # Strategy A — only very wasteful
auto_compact_undersize_ratio       = 0.0         # Strategy B disabled on the hot path
auto_compact_min_file_saved        = 0           # (gate-B irrelevant when B is off)
auto_compact_min_block_age_secs    = 7200        # 2 h anti-thrash
auto_compact_every_gc_ticks        = 60          # 60 × 120 s = once per 2 h
auto_compact_disk_headroom_bytes   = 1073741824  # 1 GiB free required

[server]
http_addr    = "0.0.0.0:8080"
grpc_addr    = "0.0.0.0:8081"
metrics_addr = "0.0.0.0:9090"
enable_access_log = false
